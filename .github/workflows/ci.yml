name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python CLI tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest tests/ -q

  swift:
    name: Night Conductor app tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift tests
        working-directory: NightConductor
        run: swift test

  build:
    name: Build app bundle
    runs-on: macos-15
    needs: [python, swift]
    steps:
      - uses: actions/checkout@v4
      - name: Build release bundle
        working-directory: NightConductor
        run: ./build-app.sh
